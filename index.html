            // Estado de Paginação da História
            const [currentStoryPage, setCurrentStoryPage] = useState(0);

            // Estados do Quiz
            const [currentQuestionIdx, setCurrentQuestionIdx] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [isAnswerCorrect, setIsAnswerCorrect] = useState(null);

            // Estado do Popup de Instalação
            const [showInstallPopup, setShowInstallPopup] = useState(false);

            // --- LÓGICA ---
            const saveProgress = (newDay) => {
                if (newDay > 7) newDay = 7;
                setUnlockedDays(newDay);
                localStorage.setItem('filhoFirme_premium_progress_v2', newDay.toString());
            };

            const startDay = (index) => {
                if (index + 1 > unlockedDays) return; 

                setActiveDayIndex(index);
                setCurrentStoryPage(0); 
                setCurrentView('story');
            };

            const nextPage = () => {
                const day = DAYS_DATA[activeDayIndex];
                if (currentStoryPage < day.pages.length - 1) {
                    setCurrentStoryPage(prev => prev + 1);
                } else {
                    startQuiz();
                }
            };

            const prevPage = () => {
                if (currentStoryPage > 0) {
                    setCurrentStoryPage(prev => prev - 1);
                } else {
                    setCurrentView('map');
                }
            };

            const startQuiz = () => {
                setCurrentQuestionIdx(0);
                setSelectedAnswer(null);
                setIsAnswerCorrect(null);
                setCurrentView('quiz');
            };

            const handleAnswerSelect = (optionIdx) => {
                if (selectedAnswer !== null) return; 

                const correctIdx = DAYS_DATA[activeDayIndex].questions[currentQuestionIdx].correct;
                const isCorrect = optionIdx === correctIdx;
                
                setSelectedAnswer(optionIdx);
                setIsAnswerCorrect(isCorrect);

                setTimeout(() => {
                    if (currentQuestionIdx < DAYS_DATA[activeDayIndex].questions.length - 1) {
                        setCurrentQuestionIdx(prev => prev + 1);
                        setSelectedAnswer(null);
                        setIsAnswerCorrect(null);
                    } else {
                        handleDayComplete();
                    }
                }, 1800);
            };

            const handleDayComplete = () => {
                if (activeDayIndex + 1 === unlockedDays && unlockedDays < 7) {
                    saveProgress(unlockedDays + 1);
                }
                setCurrentView('success');
            };

            // --- COMPONENTES VISUAIS ---

            const StartView = () => (
                <div className="animate-fade-in w-full max-w-md mx-auto bg-parchment-50 rounded-2xl shadow-xl overflow-hidden border border-parchment-200 min-h-[600px] flex flex-col items-center justify-center p-8 text-center relative z-0">
                    
                    {/* Fundo Lúdico e Elementos Flutuantes */}
                    <div className="absolute top-0 left-0 w-full h-48 bg-gradient-to-b from-blue-400 to-biblicalBlue rounded-b-[50%] shadow-md -z-10"></div>
                    <Star className="absolute top-8 left-8 text-yellow-300 animate-bounce-slight opacity-80 z-0" size={28} fill="currentColor" />
                    <Sparkles className="absolute top-16 right-8 text-yellow-100 animate-pulse opacity-90 z-0" size={32} />
                    <Star className="absolute top-36 left-12 text-blue-200 animate-pulse opacity-60 z-0" size={16} fill="currentColor" />
                    
                    {/* Ícone Mágico Principal */}
                    <div className="w-32 h-32 bg-white rounded-full flex items-center justify-center text-biblicalBlue mb-6 shadow-[0_0_20px_rgba(255,255,255,0.5)] border-4 border-yellow-400 relative z-10 animate-bounce-slight">
                        <BookOpen size={56} className="text-biblicalBlue" />
                        <Sparkles size={24} className="absolute -top-2 -right-2 text-yellow-400" fill="currentColor" />
                    </div>

                    <h1 className="text-5xl font-black font-serif text-slate-800 mb-1 relative z-10 leading-tight drop-shadow-sm">
                        Bíblia Viva<br/><span className="text-earth-500">Kids</span>
                    </h1>
                    
                    <div className="bg-yellow-100 text-earth-700 font-bold tracking-widest uppercase text-xs px-4 py-1.5 rounded-full mb-8 relative z-10 shadow-sm border border-yellow-200">
                        O Desafio de 7 Dias
                    </div>

                    <div className="bg-white border-4 border-dashed border-parchment-300 p-5 rounded-2xl w-full mb-8 relative z-10 shadow-sm text-slate-600 font-medium leading-relaxed text-lg">
                        Prepare-se para uma jornada incrível! ✨ Em apenas 15 minutos por dia, você e seu filho viverão as maiores aventuras da Bíblia.
                    </div>

                    <button 
                        onClick={() => setCurrentView('map')}
                        className="w-full bg-earth-500 text-white font-black py-4 px-6 rounded-2xl shadow-lg border-b-4 border-earth-700 hover:bg-earth-400 hover:border-earth-600 hover:-translate-y-1 transition-all active:border-b-0 active:translate-y-1 flex items-center justify-center gap-3 relative z-10 text-xl group"
                    >
                        {unlockedDays > 1 ? "Continuar Aventura" : "Começar Aventura"} 
                        <Play size={28} className="fill-current group-hover:scale-110 transition-transform" />
                    </button>

                    <button 
                        onClick={() => setShowInstallPopup(true)}
                        className="mt-6 w-full bg-white border-2 border-parchment-200 text-slate-600 font-bold py-3 px-6 rounded-xl shadow-sm hover:bg-parchment-100 transition-all active:scale-95 flex items-center justify-center gap-2 relative z-10"
                    >
                        <Download size={20} /> Instale no seu celular e acesse de qualquer lugar
                    </button>

                    <div className="mt-6 flex justify-center space-x-2 relative z-10">
                       <div className="w-2 h-2 rounded-full bg-parchment-300"></div>
                       <div className="w-4 h-2 rounded-full bg-earth-400"></div>
                       <div className="w-2 h-2 rounded-full bg-parchment-300"></div>
                    </div>
                </div>
            );

            const MapView = () => (
                <div className="animate-fade-in w-full max-w-md mx-auto bg-parchment-50 rounded-2xl shadow-xl overflow-hidden border border-parchment-200 flex flex-col relative min-h-[600px]">
                    <div className="bg-biblicalBlue p-8 text-center text-white relative overflow-hidden border-b-4 border-earth-500 shrink-0">
                        <div className="absolute top-0 right-0 opacity-10 transform translate-x-4 -translate-y-4">
                            <BookOpen size={120} />
                        </div>
                        <h2 className="text-3xl font-black mb-2 relative z-10 font-serif tracking-wide">Bíblia Viva Kids</h2>
                        <p className="text-blue-200 text-sm font-medium relative z-10 uppercase tracking-widest">O Desafio de 7 Dias</p>
                    </div>

                    <div className="p-6 relative flex-grow pb-24">
                        <div className="absolute left-10 top-10 bottom-24 w-1 bg-parchment-200 rounded"></div>

                        <div className="space-y-6 relative z-10">
                            {DAYS_DATA.map((day, index) => {
                                const isUnlocked = (index + 1) <= unlockedDays;
                                const isCompleted = (index + 1) < unlockedDays || (unlockedDays === 7 && activeDayIndex === 6 && currentView === 'success');
                                const status = isUnlocked ? 'unlocked' : 'locked';
                                
                                return (
                                    <button 
                                        key={day.id}
                                        onClick={() => startDay(index)}
                                        className={`w-full flex items-center p-3 rounded-xl transition-all duration-300 text-left relative group
                                            ${status === 'unlocked' ? 'bg-white shadow-sm border border-parchment-200 hover:border-earth-500 hover:shadow-md active:scale-95' : ''}
                                            ${status === 'locked' ? 'opacity-60 cursor-not-allowed bg-transparent' : ''}
                                        `}
                                    >
                                        <div className={`w-14 h-14 rounded-full flex items-center justify-center font-bold text-lg shrink-0 z-10 mr-4 transition-colors
                                            ${isCompleted ? 'bg-earth-500 text-white shadow-md' : ''}
                                            ${isUnlocked && !isCompleted ? 'bg-white border-4 border-earth-500 text-earth-600 shadow-lg' : ''}
                                            ${status === 'locked' ? 'bg-parchment-200 text-parchment-800' : ''}
                                        `}>
                                            {isCompleted ? <CheckCircle size={24} /> : day.id}
                                        </div>
                                        
                                        <div className="flex-grow">
                                            <h3 className={`font-bold font-serif text-lg ${status === 'locked' ? 'text-parchment-800' : 'text-slate-800'}`}>
                                                Dia {day.id}
                                            </h3>
                                            <p className={`text-sm ${status === 'locked' ? 'text-parchment-800' : 'text-earth-600 font-medium'}`}>
                                                {day.title}
                                            </p>
                                        </div>

                                        {isUnlocked && !isCompleted && (
                                            <div className="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-biblicalBlue animate-bounce-slight">
                                                <Play size={16} className="ml-1" />
                                            </div>
                                        )}
                                    </button>
                                );
                            })}
                        </div>
                    </div>

                    {/* Botão Flutuante do Guia dos Pais */}
                    <div className="absolute bottom-0 left-0 w-full p-4 bg-gradient-to-t from-parchment-100 via-parchment-50/90 to-transparent">
                        <button 
                            onClick={() => setCurrentView('parentsGuide')}
                            className="w-full bg-white border-2 border-biblicalBlue text-biblicalBlue font-bold py-3 px-4 rounded-xl shadow-md hover:bg-blue-50 transition-all active:scale-95 flex items-center justify-center gap-2"
                        >
                            <MessageCircle size={20} />
                            Área dos Pais (Guia de Conversas)
                        </button>
                    </div>
                </div>
            );

            // --- NOVA TELA: GUIA DOS PAIS ---
            const ParentsGuideView = () => (
                <div className="animate-slide-up w-full max-w-md mx-auto bg-parchment-50 rounded-2xl shadow-xl overflow-hidden border border-parchment-200 flex flex-col min-h-[600px] h-full">
                    <div className="p-4 border-b border-parchment-200 flex items-center bg-white sticky top-0 z-20">
                        <button onClick={() => setCurrentView('map')} className="text-slate-400 hover:text-biblicalBlue transition-colors p-2">
                            <ChevronLeft size={28} />
                        </button>
                        <span className="font-bold text-biblicalBlue text-lg ml-2 font-serif">Guia para os Pais</span>
                    </div>

                    <div className="p-6 overflow-y-auto">
                        <div className="bg-blue-50 border-l-4 border-biblicalBlue p-4 rounded-r-xl mb-6 text-sm text-slate-700">
                            <strong>Como usar:</strong> Utilize estas perguntas após a história ou na hora das refeições para gerar um diálogo profundo e fixar os valores bíblicos no coração do seu filho.
                        </div>

                        <div className="space-y-6">
                            {DAYS_DATA.map((day, idx) => {
                                const isUnlocked = (idx + 1) <= unlockedDays;
                                
                                if (!isUnlocked) return null; // Só mostra os dias liberados

                                return (
                                    <div key={day.id} className="bg-white border border-parchment-200 rounded-xl p-5 shadow-sm">
                                        <div className="flex items-center gap-3 mb-3 border-b border-parchment-100 pb-2">
                                            <div className="w-8 h-8 rounded-full bg-earth-100 text-earth-700 flex items-center justify-center font-bold text-sm">
                                                {day.id}
                                            </div>
                                            <h3 className="font-bold text-slate-800 font-serif">{day.title}</h3>
                                        </div>
                                        <ul className="space-y-3">
                                            {day.parentsGuide.map((question, qIdx) => (
                                                <li key={qIdx} className="flex items-start gap-2 text-slate-700 text-sm">
                                                    <MessageCircle size={16} className="text-earth-500 shrink-0 mt-0.5" />
                                                    <span>{question}</span>
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );

            const StoryView = () => {
                const day = DAYS_DATA[activeDayIndex];
                const pageData = day.pages[currentStoryPage];
                const PageIcon = pageData.imageIcon;
                const isMoralPage = currentStoryPage === day.pages.length - 1;

                return (
                    <div key={`page-${currentStoryPage}`} className="w-full max-w-md mx-auto bg-parchment-50 rounded-2xl shadow-xl overflow-hidden border border-parchment-200 flex flex-col min-h-[600px]">
                        
                        <div className="p-4 border-b border-parchment-200 flex items-center justify-between bg-white">
                            <button onClick={prevPage} className="text-slate-400 hover:text-earth-600 transition-colors p-2">
                                <ChevronLeft size={24} />
                            </button>
                            <div className="flex space-x-1">
                                {day.pages.map((_, idx) => (
                                    <div key={idx} className={`h-2 rounded-full transition-all duration-300 ${idx === currentStoryPage ? 'w-6 bg-earth-500' : 'w-2 bg-parchment-300'}`}></div>
                                ))}
                            </div>
                            <span className="text-xs font-bold text-parchment-800 bg-parchment-200 px-2 py-1 rounded">Dia {day.id}</span>
                        </div>

                        <div className="flex-grow flex flex-col p-6 animate-slide-up">
                            
                            {pageData.imageUrl ? (
                                <div className="w-full mb-6 rounded-2xl overflow-hidden shadow-md border border-parchment-200">
                                    <img 
                                        src={pageData.imageUrl} 
                                        alt={pageData.illustrationTitle || day.title} 
                                        className="w-full h-auto block object-contain"
                                    />
                                </div>
                            ) : (
                                <div className={`w-full h-48 rounded-2xl mb-6 shadow-inner flex flex-col items-center justify-center text-white bg-gradient-to-br ${pageData.bgGradient} relative overflow-hidden`}>
                                    <div className="absolute inset-0 bg-black opacity-10"></div>
                                    <PageIcon size={72} className={`mb-2 relative z-10 drop-shadow-md ${isMoralPage ? 'animate-bounce-slight text-yellow-100' : ''}`} />
                                    <span className="font-serif font-bold tracking-wide relative z-10 drop-shadow-md">{pageData.illustrationTitle}</span>
                                </div>
                            )}
                            
                            {!isMoralPage && (
                                <h2 className="text-2xl font-black font-serif text-slate-800 mb-4">{day.title}</h2>
                            )}
                            
                            <div className={`bg-white p-5 rounded-xl border ${isMoralPage ? 'border-amber-300 shadow-md bg-amber-50' : 'border-parchment-200 shadow-sm'} flex-grow`}>
                                {isMoralPage ? (
                                    <div className="space-y-2">
                                        <p className="font-bold text-earth-600 font-serif text-xl mb-2 tracking-wide">
                                            {pageData.text.split("?")[0] + "?"}
                                        </p>
                                        <p className="text-slate-700 leading-relaxed text-lg font-medium">
                                            {pageData.text.split("?")[1]}
                                        </p>
                                    </div>
                                ) : (
                                    <p className="text-slate-700 leading-relaxed text-lg font-medium">
                                        {pageData.text}
                                    </p>
                                )}
                            </div>
                        </div>

                        <div className="p-6 pt-0 mt-auto">
                            <button 
                                onClick={nextPage}
                                className="w-full bg-earth-600 text-white font-bold py-4 px-6 rounded-xl shadow-md hover:bg-earth-500 transition-all active:scale-95 flex items-center justify-center gap-2"
                            >
                                {currentStoryPage < day.pages.length - 1 ? (
                                    <>Próxima Página <ArrowRight size={20} /></>
                                ) : (
                                    <>Iniciar o Quiz de Hoje <Sparkles size={20} /></>
                                )}
                            </button>
                        </div>
                    </div>
                );
            };

            const QuizView = () => {
                const day = DAYS_DATA[activeDayIndex];
                const question = day.questions[currentQuestionIdx];

                return (
                    <div className="animate-fade-in w-full max-w-md mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-parchment-200 min-h-[500px] flex flex-col">
                        <div className="bg-biblicalBlue p-5 flex justify-between items-center text-white border-b-4 border-earth-500">
                            <span className="font-serif font-bold tracking-wide">Desafio do Conhecimento</span>
                            <span className="bg-white text-biblicalBlue px-3 py-1 rounded-full text-xs font-bold shadow-sm">
                                {currentQuestionIdx + 1} / {day.questions.length}
                            </span>
                        </div>

                        <div className="p-6 flex-grow flex flex-col justify-center bg-parchment-50">
                            <h3 className="text-xl font-bold font-serif text-slate-800 text-center mb-8 leading-snug">
                                {question.q}
                            </h3>

                            <div className="space-y-4">
                                {question.options.map((opt, idx) => {
                                    const isSelected = selectedAnswer === idx;
                                    const isCorrect = idx === question.correct;
                                    
                                    let btnClass = "border-parchment-300 bg-white text-slate-700 hover:border-earth-400 hover:shadow-sm";
                                    
                                    if (selectedAnswer !== null) {
                                        if (isCorrect) {
                                            btnClass = "border-emerald-500 bg-emerald-50 text-emerald-800 shadow-md ring-2 ring-emerald-500 ring-opacity-50";
                                        } else if (isSelected && !isCorrect) {
                                            btnClass = "border-rose-400 bg-rose-50 text-rose-700";
                                        } else {
                                            btnClass = "border-parchment-200 bg-parchment-50 text-slate-400 opacity-50"; 
                                        }
                                    }

                                    return (
                                        <button
                                            key={idx}
                                            onClick={() => handleAnswerSelect(idx)}
                                            disabled={selectedAnswer !== null}
                                            className={`w-full p-4 rounded-xl border-2 font-medium text-left transition-all duration-300 flex items-center justify-between shadow-sm ${btnClass} ${selectedAnswer === null ? 'active:scale-95' : ''}`}
                                        >
                                            <span className="text-lg">{opt}</span>
                                            {selectedAnswer !== null && isCorrect && <CheckCircle className="text-emerald-500" size={24} />}
                                        </button>
                                    );
                                })}
                            </div>

                            <div className="mt-8 h-12 flex justify-center items-center">
                                {selectedAnswer !== null && (
                                    <div className={`animate-slide-up px-6 py-3 rounded-xl font-bold text-sm shadow-sm ${isAnswerCorrect ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800'}`}>
                                        {isAnswerCorrect ? "🎉 Muito bem! Você acertou!" : "Ops! Quase lá, tente lembrar da história."}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            const SuccessView = () => {
                const dayData = DAYS_DATA[activeDayIndex];
                const isFinalDay = activeDayIndex === 6; 
                
                // Estados para o Certificado
                const [childName, setChildName] = useState("");
                const [showCertificate, setShowCertificate] = useState(false);

                return (
                    <div className="animate-fade-in w-full max-w-md mx-auto bg-parchment-50 rounded-2xl shadow-xl overflow-hidden border border-parchment-200 min-h-[500px] flex flex-col items-center justify-center p-8 text-center relative">
                        
                        {isFinalDay ? (
                            // CONTEÚDO FINAL (DIA 7) COM CERTIFICADO
                            <div className="w-full flex flex-col items-center">
                                <div className="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
                                    <div className="absolute top-10 left-10 text-earth-400 animate-bounce"><Star size={32} fill="currentColor"/></div>
                                    <div className="absolute top-20 right-10 text-earth-500 animate-bounce" style={{animationDelay: '0.3s'}}><Star size={24} fill="currentColor"/></div>
                                    <div className="absolute bottom-40 left-20 text-earth-300 animate-bounce" style={{animationDelay: '0.6s'}}><Star size={20} fill="currentColor"/></div>
                                </div>

                                {!showCertificate ? (
                                    // ETAPA 1: PEDIR O NOME
                                    <div className="animate-slide-up w-full relative z-10 flex flex-col items-center">
                                        <div className="w-28 h-28 bg-gradient-to-br from-yellow-300 to-earth-500 rounded-full flex items-center justify-center text-white mb-6 shadow-xl border-4 border-white">
                                            <Crown size={56} />
                                        </div>

                                        <h2 className="text-3xl font-black font-serif text-slate-800 mb-2">Jornada Concluída!</h2>
                                        <p className="text-slate-600 mb-8 font-medium">
                                            Vocês finalizaram os 7 Dias construindo raízes fortes na fé. É hora da recompensa!
                                        </p>

                                        <div className="w-full bg-white p-6 rounded-2xl border-2 border-earth-200 shadow-md">
                                            <label className="block text-sm font-bold text-earth-700 mb-3 uppercase tracking-wide">
                                                Nome do Herói(ína) da Fé:
                                            </label>
                                            <input 
                                                type="text" 
                                                value={childName}
                                                onChange={(e) => setChildName(e.target.value)}
                                                placeholder="Ex: João Miguel"
                                                className="w-full text-center text-xl font-bold p-3 border-b-2 border-parchment-300 focus:outline-none focus:border-earth-500 mb-6 bg-parchment-50 rounded-t-md"
                                                maxLength={25}
                                            />
                                            <button 
                                                onClick={() => { if(childName.trim().length > 1) setShowCertificate(true) }}
                                                className={`w-full font-black py-4 px-6 rounded-xl shadow-md transition-all active:scale-95 flex items-center justify-center gap-2 ${childName.trim().length > 1 ? 'bg-earth-600 hover:bg-earth-500 text-white' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}
                                            >
                                                <FileText size={20} /> Gerar Certificado
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    // ETAPA 2: EXIBIR O CERTIFICADO
                                    <div className="animate-fade-in w-full relative z-10 flex flex-col items-center mt-4">
                                        
                                        <div className="w-full bg-white p-2 shadow-2xl rounded">
                                            <div className="w-full border-double border-4 border-earth-400 p-6 flex flex-col items-center bg-parchment-50 relative overflow-hidden">
                                                <div className="absolute opacity-5"><BookOpen size={200}/></div>
                                                
                                                <Award size={48} className="text-earth-600 mb-2 relative z-10" />
                                                <h3 className="text-earth-700 font-serif font-black text-2xl uppercase tracking-widest mb-4 relative z-10">Certificado</h3>
                                                
                                                <p className="text-xs text-slate-500 uppercase tracking-widest mb-2 relative z-10">Certificamos que</p>
                                                <h2 className="text-3xl text-biblicalBlue font-black font-serif italic mb-4 relative z-10 border-b border-earth-300 px-4 pb-2">{childName}</h2>
                                                
                                                <p className="text-sm text-slate-700 font-medium relative z-10 mb-6">
                                                    Concluiu com excelência o Desafio de 7 Dias, demonstrando grande conhecimento nas histórias e tornando-se um verdadeiro Herói da Fé.
                                                </p>
                                                
                                                <div className="w-full flex justify-between items-end mt-4 relative z-10">
                                                    <div className="text-left w-1/2">
                                                        <div className="border-b border-slate-400 mb-1 w-24"></div>
                                                        <p className="text-[10px] text-slate-500">Data de Conclusão</p>
                                                    </div>
                                                    <div className="text-right flex flex-col items-end">
                                                        <div className="font-serif italic text-earth-700 font-bold text-lg mb-0 leading-none">Bíblia Viva</div>
                                                        <p className="text-[10px] text-slate-500">Assinatura Oficial</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <p className="text-sm font-bold text-emerald-600 mt-6 bg-emerald-50 px-4 py-2 rounded-full border border-emerald-200">
                                            📸 Tire um print desta tela e guarde!
                                        </p>

                                        <button onClick={() => setCurrentView('map')} className="mt-8 text-sm text-slate-500 underline hover:text-slate-700 font-medium">
                                            Voltar ao Mapa Principal
                                        </button>
                                    </div>
                                )}
                            </div>
                        ) : (
                            // CONTEÚDO PADRÃO (DIAS 1 A 6)
                            <div className="w-full flex flex-col items-center">
                                <div className="w-24 h-24 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-500 mb-6 shadow-inner relative z-10">
                                    <Award size={48} />
                                </div>

                                <h2 className="text-3xl font-black font-serif text-slate-800 mb-2 relative z-10">Parabéns!</h2>
                                <p className="text-slate-600 mb-6 relative z-10 text-lg">
                                    Você completou o <strong>Dia {dayData.id}</strong> e a fé aumentou!
                                </p>

                                <div className="bg-white border-2 border-earth-200 p-5 rounded-xl w-full mb-8 relative z-10 shadow-sm text-left animate-slide-up" style={{animationDelay: '0.2s'}}>
                                    <div className="flex items-center gap-2 mb-3">
                                        <Target className="text-earth-500" size={24} />
                                        <h3 className="font-bold text-lg text-slate-800 font-serif">Sua Missão de Hoje:</h3>
                                    </div>
                                    <p className="text-slate-700 font-medium leading-relaxed">
                                        {dayData.mission}
                                    </p>
                                </div>

                                <button 
                                    onClick={() => setCurrentView('map')}
                                    className="w-full bg-earth-600 text-white font-bold py-4 px-6 rounded-xl shadow-md hover:bg-earth-500 transition-all active:scale-95 flex items-center justify-center gap-2 relative z-10"
                                >
                                    Voltar para o Mapa
                                </button>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="w-full max-w-md mx-auto">
                    {currentView === 'start' && <StartView />}
                    {currentView === 'map' && <MapView />}
                    {currentView === 'parentsGuide' && <ParentsGuideView />}
                    {currentView === 'story' && <StoryView />}
                    {currentView === 'quiz' && <QuizView />}
                    {currentView === 'success' && <SuccessView />}

                    {/* POPUP DE INSTALAÇÃO */}
                    {showInstallPopup && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center bg-black/60 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white w-full max-w-md rounded-t-3xl sm:rounded-3xl p-6 relative shadow-2xl animate-slide-up">
                                <button
                                    onClick={() => setShowInstallPopup(false)}
                                    className="absolute top-4 right-4 text-slate-400 hover:text-slate-600 bg-slate-100 rounded-full p-1 transition-colors"
                                >
                                    <X size={24} />
                                </button>

                                <div className="flex justify-center mb-4 mt-2">
                                    <div className="w-16 h-16 bg-biblicalBlue rounded-2xl flex items-center justify-center text-white shadow-lg border-4 border-yellow-400">
                                        <BookOpen size={32} />
                                    </div>
                                </div>

                                <h3 className="text-xl font-black text-slate-800 text-center mb-2 font-serif">Instale o App</h3>
                                <p className="text-slate-600 text-sm text-center mb-6 font-medium">
                                    Jogue em tela cheia e acesse direto da tela inicial do seu celular, como um aplicativo de verdade!
                                </p>

                                <div className="space-y-4 text-slate-700 text-sm font-bold bg-parchment-50 p-5 rounded-2xl border border-parchment-200">
                                    <p className="flex items-center gap-3">
                                        <span className="bg-white border border-slate-200 w-8 h-8 flex items-center justify-center rounded-full text-biblicalBlue shrink-0 shadow-sm"><Share size={16} /></span>
                                        <span>1. Toque em <strong>Compartilhar</strong> (ou nos 3 pontinhos) no navegador.</span>
                                    </p>
                                    <p className="flex items-center gap-3">
                                        <span className="bg-white border border-slate-200 w-8 h-8 flex items-center justify-center rounded-full text-earth-500 shrink-0 shadow-sm"><PlusSquare size={16} /></span>
                                        <span>2. Escolha <strong>"Adicionar à Tela de Início"</strong>.</span>
                                    </p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
